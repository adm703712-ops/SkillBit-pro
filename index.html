<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit Pro | المنصة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnmfqxq_kWTYnxw2JPFRhfdfjhOjnQ3c0",
            authDomain: "skillbit-pro.firebaseapp.com",
            projectId: "skillbit-pro",
            storageBucket: "skillbit-pro.firebasestorage.app",
            messagingSenderId: "67822035704",
            appId: "1:67822035704:web:62dbf17cc9a5b5aeccd10d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                setupProfile(user);
            } else {
                document.getElementById('login-page').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        async function setupProfile(user) {
            const docRef = doc(db, "users", user.uid);
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.userData = data;
                    renderProfileUI(data, user);
                    initChart(data.history || []);
                } else {
                    setDoc(docRef, { 
                        wallet: 1000, 
                        likes: 0, 
                        hearts: 0, 
                        bio: "مستثمر طموح في سكيلبت",
                        cover: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000&auto=format&fit=crop",
                        history: [1000, 1050, 980, 1100, 1200] 
                    });
                }
            });
        }

        function renderProfileUI(data, user) {
            document.getElementById('user-img').src = user.photoURL;
            document.getElementById('cover-img').style.backgroundImage = `url(${data.cover})`;
            document.getElementById('profile-name').innerText = user.displayName;
            document.getElementById('profile-bio').innerText = data.bio;
            
            // نظام النجوم (10 لايك = نجمة، 5 قلوب = نجمة)
            const starsFromLikes = Math.floor(data.likes / 10);
            const starsFromHearts = Math.floor(data.hearts / 5);
            const totalStars = starsFromLikes + starsFromHearts;
            
            document.getElementById('star-count').innerText = "⭐".repeat(totalStars) || "لا توجد نجوم بعد";
            document.getElementById('stats-display').innerText = `👍 ${data.likes} | ❤️ ${data.hearts}`;
            document.getElementById('balance-profile').innerText = `$${data.wallet}`;
        }

        let myChart;
        function initChart(historyData) {
            const ctx = document.getElementById('investmentChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['الأسبوع 1', 'الأسبوع 2', 'الأسبوع 3', 'الأسبوع 4', 'اليوم'],
                    datasets: [{
                        label: 'أداء المحفظة',
                        data: historyData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { display: false } }, x: { grid: { display: false } } } }
            });
        }
    </script>

    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: white; }
    </style>
</head>
<body>

    <div id="login-page" class="fixed inset-0 z-[5000] bg-[#020617] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black italic mb-4 text-blue-500">SKILLBIT</h1>
        <button onclick="login()" class="glass px-10 py-5 rounded-2xl flex items-center gap-4 hover:scale-105 transition-all">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6">
            <span class="font-bold">ابدأ التداول الآن</span>
        </button>
    </div>

    <div id="app-content" style="display:none" class="pb-32">
        <div id="profile-section" class="max-w-xl mx-auto">
            <div id="cover-img" class="h-48 bg-cover bg-center relative rounded-b-[40px] shadow-2xl">
                <div class="absolute -bottom-12 right-8">
                    <img id="user-img" src="" class="w-24 h-24 rounded-3xl border-4 border-[#020617] shadow-xl">
                </div>
            </div>

            <div class="mt-14 px-8">
                <h2 id="profile-name" class="text-2xl font-black text-white">تحميل..</h2>
                <p id="star-count" class="text-yellow-400 text-sm mt-1"></p>
                <p id="profile-bio" class="text-slate-400 text-sm mt-2 leading-relaxed italic"></p>
                
                <div class="flex gap-4 mt-4">
                    <div class="glass flex-1 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">الرصيد</p>
                        <p id="balance-profile" class="text-xl font-black text-blue-400">$0</p>
                    </div>
                    <div class="glass flex-1 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">التفاعل</p>
                        <p id="stats-display" class="text-sm font-bold mt-1">👍 0 | ❤️ 0</p>
                    </div>
                </div>

                <div class="glass mt-6 p-6 rounded-[30px]">
                    <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest text-center">أداء استثماراتك (النمو والخسارة)</h3>
                    <canvas id="investmentChart"></canvas>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around items-center rounded-t-[35px] z-50">
            <button onclick="showSection('market')" class="flex flex-col items-center gap-1">
                <span class="text-xl">📊</span>
                <span class="text-[10px] font-bold">السوق</span>
            </button>
            <button onclick="showSection('profile')" class="flex flex-col items-center gap-1">
                <span class="text-xl">👤</span>
                <span class="text-[10px] font-bold">حسابي</span>
            </button>
            <button onclick="document.getElementById('add-modal').style.display='flex'" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40 -mt-10 border-4 border-[#020617]">
                <span class="text-2xl">+</span>
            </button>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/90 z-[6000] hidden items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-8 rounded-[40px] w-full max-w-md border-blue-500/20">
            <h2 class="text-2xl font-black mb-6 text-center">انضم للسوق</h2>
            <form action="https://formspree.io/f/meerzzqk" method="POST" class="space-y-4 text-right">
                <input type="text" name="name" placeholder="اسمك التجاري" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-white/5" required>
                <input type="text" name="skill" placeholder="تخصصك (مثلاً: مطور تطبيقات)" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-white/5" required>
                <textarea name="bio" placeholder="نبذة صغيرة تظهر للمستثمرين" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-white/5 h-24" required></textarea>
                <button type="submit" class="w-full bg-blue-600 p-4 rounded-2xl font-black shadow-xl hover:bg-blue-500 transition-all">تقديم طلب الإدراج</button>
                <button type="button" onclick="document.getElementById('add-modal').style.display='none'" class="w-full text-slate-500 text-sm">رجوع</button>
            </form>
        </div>
    </div>

    <script>
        function showSection(name) {
            // منطق التبديل بين السوق والبروفايل
            alert("هذه الميزة ستفتح السوق الحقيقي حالما تنشر الرابط!");
        }
    </script>
</body>
</html>
