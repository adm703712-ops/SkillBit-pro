<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit | بورصة المهارات</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 120px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: 0.3s; }
        .wallet-bar { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(59, 130, 246, 0.5); position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
        .price-up { color: #10b981; animation: pulse-green 2s infinite; }
        .price-down { color: #ef4444; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 max-w-2xl mx-auto">
        <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic">SkillBit</h1>
        <div class="bg-emerald-500/10 text-emerald-400 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest border border-emerald-500/20">LIVE MARKET</div>
    </header>

    <div id="market" class="grid gap-6 max-w-2xl mx-auto">
        <p class="text-center opacity-50">جاري فحص مؤشرات السوق...</p>
    </div>

    <div class="wallet-bar p-5 shadow-2xl">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-slate-500 text-[9px] uppercase tracking-[0.2em] mb-1">Available Capital</p>
                <p id="wallet-balance" class="text-2xl font-black text-white">$1,000.00</p>
            </div>
            <div class="text-left border-l border-slate-800 pl-4">
                <p id="inv-count" class="text-blue-400 font-black text-lg">0</p>
                <p class="text-slate-500 text-[9px] uppercase">Investments</p>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';
        
        let userWallet = localStorage.getItem('sb_wallet') ? parseFloat(localStorage.getItem('sb_wallet')) : 1000.00;
        let myInvestments = JSON.parse(localStorage.getItem('sb_invests')) || [];
        let lastPrices = JSON.parse(localStorage.getItem('sb_prices')) || {};

        function updateUI() {
            document.getElementById('wallet-balance').innerText = `$${userWallet.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('inv-count').innerText = myInvestments.length;
        }

        function invest(name, price) {
            price = parseFloat(price);
            if (userWallet >= price) {
                userWallet -= price;
                myInvestments.push({ name, price, date: new Date() });
                localStorage.setItem('sb_wallet', userWallet);
                localStorage.setItem('sb_invests', JSON.stringify(myInvestments));
                updateUI();
                alert(`🎯 تم شراء سهم ${name} بنجاح!`);
            } else {
                alert("⚠️ عذراً، رصيدك الحالي لا يسمح بهذا الاستثمار.");
            }
        }

        function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const market = document.getElementById('market');
                    market.innerHTML = '';
                    const newPrices = {};

                    results.data.forEach(row => {
                        if(row.Name) {
                            const currentPrice = parseFloat(row.Stock_pirce) || 0;
                            const oldPrice = lastPrices[row.Name] || currentPrice;
                            newPrices[row.Name] = currentPrice;

                            let trendIcon = '';
                            let trendClass = 'text-white';

                            if (currentPrice > oldPrice) {
                                trendIcon = '▲';
                                trendClass = 'price-up';
                            } else if (currentPrice < oldPrice) {
                                trendIcon = '▼';
                                trendClass = 'price-down';
                            }

                            market.innerHTML += `
                                <div class="card p-6 shadow-xl relative overflow-hidden">
                                    <div class="flex items-center gap-5">
                                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-2xl font-black shadow-inner border border-white/10">
                                            ${row.Name.charAt(0)}
                                        </div>
                                        <div class="flex-1">
                                            <div class="flex justify-between items-start">
                                                <h3 class="font-bold text-xl tracking-tight">${row.Name}</h3>
                                                <div class="text-right">
                                                    <span class="block text-2xl font-black ${trendClass}">
                                                        ${trendIcon} $${currentPrice}
                                                    </span>
                                                </div>
                                            </div>
                                            <p class="text-blue-400/80 text-sm font-semibold mt-1">${row.Skill}</p>
                                        </div>
                                    </div>
                                    <div class="mt-5 pt-4 border-t border-white/5 flex justify-between items-center">
                                        <p class="text-slate-500 text-xs italic w-2/3 truncate">${row.Bio || 'No description available'}</p>
                                        <button onclick="invest('${row.Name}', '${currentPrice}')" class="bg-white text-slate-900 text-[10px] px-5 py-2 rounded-xl font-black uppercase tracking-wider hover:bg-blue-400 transition-colors">
                                            Invest
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                    lastPrices = newPrices;
                    localStorage.setItem('sb_prices', JSON.stringify(lastPrices));
                    updateUI();
                }
            });
        }

        fetchData();
        setInterval(fetchData, 10000); // تحديث كل 10 ثوانٍ لمتابعة السوق
    </script>
</body>
</html>
