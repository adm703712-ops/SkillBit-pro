<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit | بورصة المهارات</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">SkillBit</h1>
        <div class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">LIVE MARKET</div>
    </header>

    <div id="market" class="grid gap-4 max-w-2xl mx-auto">
        </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';

        function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const market = document.getElementById('market');
                    market.innerHTML = '';
                    results.data.forEach(row => {
                        if(row.Name) {
                            market.innerHTML += `
                                <div class="card p-5 shadow-2xl">
                                    <div class="flex items-center gap-4 mb-3">
                                        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xl font-bold shadow-lg">
                                            ${row.Name.charAt(0)}
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-lg text-white">${row.Name}</h3>
                                            <p class="text-blue-400 text-sm font-medium">${row.Skill}</p>
                                        </div>
                                    </div>
                                    <p class="text-slate-400 text-sm leading-relaxed border-t border-slate-700 pt-3 mt-2 italic">
                                        ${row.Bio || 'لا يوجد وصف متاح'}
                                    </p>
                                    <div class="mt-4 flex justify-between items-center">
                                        <span class="text-xs text-slate-500 uppercase tracking-widest">Skill Identity</span>
                                        <button class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] px-4 py-1.5 rounded-full font-bold transition">INVEST</button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
            });
        }
        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
