<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit | بورصة المهارات</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 100px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; }
        .wallet-bar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #3b82f6; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">SkillBit</h1>
        <div class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold animate-pulse">LIVE MARKET</div>
    </header>

    <div id="market" class="grid gap-4 max-w-2xl mx-auto">
        <p class="text-center opacity-50">جاري تحميل سوق المهارات...</p>
    </div>

    <div class="wallet-bar p-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest">رصيدك المتاح</p>
                <p id="wallet-balance" class="text-2xl font-black text-emerald-400">$1000.00</p>
            </div>
            <div class="text-left">
                <p id="inv-count" class="text-blue-400 font-bold text-sm">0 استثمارات</p>
                <p class="text-slate-500 text-[10px]">MY PORTFOLIO</p>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';

        // --- نظام المحفظة ---
        let userWallet = localStorage.getItem('sb_wallet') ? parseFloat(localStorage.getItem('sb_wallet')) : 1000.00;
        let myInvestments = JSON.parse(localStorage.getItem('sb_invests')) || [];

        function updateUI() {
            document.getElementById('wallet-balance').innerText = `$${userWallet.toLocaleString()}`;
            document.getElementById('inv-count').innerText = `${myInvestments.length} استثمارات`;
        }

        function invest(name, price) {
            price = parseFloat(price);
            if (userWallet >= price) {
                userWallet -= price;
                myInvestments.push({ name, price, date: new Date() });
                localStorage.setItem('sb_wallet', userWallet);
                localStorage.setItem('sb_invests', JSON.stringify(myInvestments));
                updateUI();
                alert(`🚀 تم الاستثمار بنجاح في مهارة ${name}!`);
            } else {
                alert("❌ عذراً، رصيدك غير كافٍ لهذا الاستثمار.");
            }
        }

        function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const market = document.getElementById('market');
                    market.innerHTML = '';
                    results.data.forEach(row => {
                        if(row.Name) {
                            // استخدام اسم العمود Stock_pirce كما في ملفك
                            const price = row.Stock_pirce || 50; 
                            market.innerHTML += `
                                <div class="card p-5 shadow-2xl">
                                    <div class="flex items-center gap-4 mb-3">
                                        <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-xl font-bold shadow-lg">
                                            ${row.Name.charAt(0)}
                                        </div>
                                        <div class="flex-1">
                                            <div class="flex justify-between items-start">
                                                <h3 class="font-bold text-lg text-white">${row.Name}</h3>
                                                <span class="text-emerald-400 font-black text-xl">$${price}</span>
                                            </div>
                                            <p class="text-blue-400 text-sm font-medium">${row.Skill}</p>
                                        </div>
                                    </div>
                                    <p class="text-slate-400 text-sm italic border-t border-slate-700 pt-3 mt-2">
                                        ${row.Bio || 'وصف المهارة متاح للمستثمرين فقط'}
                                    </p>
                                    <div class="mt-4 flex justify-end">
                                        <button onclick="invest('${row.Name}', '${price}')" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white text-xs px-6 py-2 rounded-full font-bold transition-all shadow-lg shadow-blue-900/20">
                                            INVEST
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                    updateUI();
                }
            });
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
