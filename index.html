<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit | التداول الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; padding-bottom: 140px; }
        .card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; position: relative; z-index: 10; }
        .wallet-bar { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 2px solid #3b82f6; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
        canvas { max-height: 80px !important; pointer-events: none; }
        button { position: relative; z-index: 50; } /* لضمان أن الزر دائماً قابل للضغط */
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-8 max-w-2xl mx-auto">
        <h1 class="text-3xl font-black italic text-blue-400">SkillBit</h1>
        <button onclick="toggleModal('join-modal', true)" class="bg-blue-600 px-4 py-2 rounded-full text-[10px] font-black">ADD SKILL</button>
    </header>

    <div id="market" class="grid gap-6 max-w-2xl mx-auto">
        <p class="text-center opacity-30">جاري الاتصال بمنصة التداول...</p>
    </div>

    <div id="portfolio-modal" class="modal">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-[32px] w-full max-w-md shadow-2xl overflow-y-auto max-h-[70vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-blue-400">محفظتي الاستثمارية</h2>
                <button onclick="toggleModal('portfolio-modal', false)" class="text-white text-xl">✕</button>
            </div>
            <div id="portfolio-list" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="join-modal" class="modal">
        <div class="bg-slate-900 p-8 rounded-[32px] w-full max-w-md">
            <h2 class="text-xl font-bold mb-4 text-center">انضم للسوق</h2>
            <form action="https://formspree.io/f/meerzzqk" method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="الاسم" class="w-full bg-slate-800 p-4 rounded-xl outline-none" required>
                <input type="text" name="skill" placeholder="المهارة" class="w-full bg-slate-800 p-4 rounded-xl outline-none" required>
                <button type="submit" class="w-full bg-blue-600 p-4 rounded-xl font-bold">إرسال</button>
                <button type="button" onclick="toggleModal('join-modal', false)" class="w-full text-slate-400">إلغاء</button>
            </form>
        </div>
    </div>

    <div class="wallet-bar p-6 shadow-2xl cursor-pointer" onclick="openPortfolio()">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-slate-500 text-[9px] uppercase font-bold mb-1">Available Balance</p>
                <p id="wallet-balance" class="text-3xl font-black text-white">$1,000.00</p>
            </div>
            <div class="text-left border-r border-slate-800 pr-6">
                <p id="inv-count" class="text-emerald-400 font-black text-2xl">0</p>
                <p class="text-slate-500 text-[9px] uppercase font-bold tracking-widest">Investments</p>
            </div>
        </div>
        <p class="text-center text-[8px] text-blue-500 mt-2 animate-bounce">اضغط هنا لرؤية أسهمك ☝️</p>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';
        
        let userWallet = localStorage.getItem('sb_wallet') ? parseFloat(localStorage.getItem('sb_wallet')) : 1000.00;
        let myInvestments = JSON.parse(localStorage.getItem('sb_invests')) || [];
        let priceHistories = {}; 
        let charts = {};

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function openPortfolio() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = myInvestments.length === 0 ? '<p class="text-center text-slate-500">لا توجد أسهم حالياً</p>' : '';
            myInvestments.forEach((inv, index) => {
                list.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center border-l-4 border-blue-500">
                        <div><p class="font-bold">${inv.name}</p><p class="text-[10px] opacity-50">تاريخ الشراء: ${inv.date}</p></div>
                        <p class="font-black text-emerald-400">$${inv.price}</p>
                    </div>`;
            });
            toggleModal('portfolio-modal', true);
        }

        function invest(name, price) {
            if (userWallet >= price) {
                userWallet -= price;
                myInvestments.push({ name, price, date: new Date().toLocaleTimeString() });
                localStorage.setItem('sb_wallet', userWallet);
                localStorage.setItem('sb_invests', JSON.stringify(myInvestments));
                updateUI();
                alert(`✅ تم شراء سهم ${name} بنجاح!`);
            } else { alert("❌ عذراً، رصيدك غير كافٍ."); }
        }

        function updateUI() {
            document.getElementById('wallet-balance').innerText = `$${userWallet.toLocaleString()}`;
            document.getElementById('inv-count').innerText = myInvestments.length;
        }

        function updateChart(name, history) {
            const ctx = document.getElementById(`chart-${name}`);
            if (!ctx) return;
            const color = history[history.length-1] >= history[history.length-2] ? '#10b981' : '#ef4444';
            
            if (charts[name]) {
                charts[name].data.datasets[0].data = history;
                charts[name].data.datasets[0].borderColor = color;
                charts[name].update();
            } else {
                charts[name] = new Chart(ctx, {
                    type: 'line',
                    data: { labels: history.map((_, i) => i), datasets: [{ data: history, borderColor: color, borderWidth: 2, fill: false, pointRadius: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
                });
            }
        }

        function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true, header: true,
                complete: function(results) {
                    const market = document.getElementById('market');
                    results.data.forEach(row => {
                        if(row.Name) {
                            const name = row.Name;
                            const price = parseFloat(row.Price) || 0;
                            if (!priceHistories[name]) priceHistories[name] = [];
                            if (priceHistories[name][priceHistories[name].length-1] !== price) priceHistories[name].push(price);
                            if (priceHistories[name].length > 10) priceHistories[name].shift();

                            if (!document.getElementById(`card-${name}`)) {
                                market.innerHTML += `
                                    <div id="card-${name}" class="card p-6 shadow-xl">
                                        <div class="flex justify-between items-center mb-4">
                                            <h3 class="font-bold text-xl">${name}</h3>
                                            <span class="text-2xl font-black">$${price}</span>
                                        </div>
                                        <canvas id="chart-${name}"></canvas>
                                        <div class="flex justify-between items-center mt-4">
                                            <p class="text-blue-400 text-xs">${row.Skill}</p>
                                            <button onclick="invest('${name}', ${price})" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black">INVEST</button>
                                        </div>
                                    </div>`;
                            }
                            setTimeout(() => updateChart(name, priceHistories[name]), 100);
                        }
                    });
                    updateUI();
                }
            });
        }

        fetchData(); updateUI(); setInterval(fetchData, 15000);
    </script>
</body>
</html>
