<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit | بورصة المهارات</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding-bottom: 120px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .wallet-bar { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 2px solid #3b82f6; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        .price-up { color: #10b981; }
        .price-down { color: #ef4444; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 max-w-2xl mx-auto">
        <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">SkillBit</h1>
        <div class="bg-emerald-500/10 text-emerald-400 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest border border-emerald-500/20">LIVE MARKET</div>
    </header>

    <div id="market" class="grid gap-6 max-w-2xl mx-auto text-center">
        <p class="opacity-50">جاري الاتصال بالسوق...</p>
    </div>

    <div class="wallet-bar p-5 shadow-2xl">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest mb-1">الرصيد المتاح</p>
                <p id="wallet-balance" class="text-2xl font-black text-white">$1,000.00</p>
            </div>
            <div class="text-left border-l border-slate-800 pl-4">
                <p id="inv-count" class="text-blue-400 font-black text-lg">0</p>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest">استثمارات</p>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';
        
        let userWallet = localStorage.getItem('sb_wallet') ? parseFloat(localStorage.getItem('sb_wallet')) : 1000.00;
        let myInvestments = JSON.parse(localStorage.getItem('sb_invests')) || [];
        let lastPrices = JSON.parse(localStorage.getItem('sb_prices')) || {};

        function updateUI() {
            document.getElementById('wallet-balance').innerText = `$${userWallet.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('inv-count').innerText = myInvestments.length;
        }

        function invest(name, price) {
            const p = parseFloat(price);
            if (userWallet >= p) {
                userWallet -= p;
                myInvestments.push({ name, price: p, date: new Date() });
                localStorage.setItem('sb_wallet', userWallet.toString());
                localStorage.setItem('sb_invests', JSON.stringify(myInvestments));
                updateUI();
                alert(`🚀 تم الاستثمار في ${name} بنجاح!`);
            } else {
                alert("❌ الرصيد غير كافٍ!");
            }
        }

        function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const market = document.getElementById('market');
                    market.innerHTML = '';
                    const newPrices = {};

                    results.data.forEach(row => {
                        if(row.Name) {
                            // التعديل هنا: قراءة عمود Price الجديد
                            const currentPrice = parseFloat(row.Price) || 0;
                            const oldPrice = lastPrices[row.Name] || currentPrice;
                            newPrices[row.Name] = currentPrice;

                            let trend = '';
                            let colorClass = 'text-white';
                            if (currentPrice > oldPrice) { trend = '▲'; colorClass = 'price-up'; }
                            else if (currentPrice < oldPrice) { trend = '▼'; colorClass = 'price-down'; }

                            market.innerHTML += `
                                <div class="card p-6 shadow-xl">
                                    <div class="flex items-center gap-5">
                                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-2xl font-black">
                                            ${row.Name.charAt(0)}
                                        </div>
                                        <div class="flex-1 text-right">
                                            <div class="flex justify-between items-start">
                                                <h3 class="font-bold text-xl">${row.Name}</h3>
                                                <span class="text-2xl font-black ${colorClass}">
                                                    ${trend} $${currentPrice}
                                                </span>
                                            </div>
                                            <p class="text-blue-400 text-sm font-semibold">${row.Skill}</p>
                                        </div>
                                    </div>
                                    <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                                        <p class="text-slate-500 text-xs italic">${row.Bio || 'وصف المهارة...'}</p>
                                        <button onclick="invest('${row.Name}', ${currentPrice})" class="bg-blue-600 text-white text-[10px] px-6 py-2 rounded-xl font-black uppercase tracking-wider">
                                            Invest
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                    lastPrices = newPrices;
                    localStorage.setItem('sb_prices', JSON.stringify(lastPrices));
                    updateUI();
                }
            });
        }

        fetchData();
        updateUI();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
