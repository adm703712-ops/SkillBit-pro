<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillBit Pro | معاينة التجربة الكاملة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        // ملاحظة: عطلنا تسجيل الدخول الإلزامي، لكن تركنا المكتبات جاهزة
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnmfqxq_kWTYnxw2JPFRhfdfjhOjnQ3c0",
            authDomain: "skillbit-pro.firebaseapp.com",
            projectId: "skillbit-pro",
            storageBucket: "skillbit-pro.firebasestorage.app",
            messagingSenderId: "67822035704",
            appId: "1:67822035704:web:62dbf17cc9a5b5aeccd10d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // بيانات المستخدم التجريبي (Placeholder للدخول المعطل)
        const demoUser = {
            displayName: "مصطفى الجارس 👋",
            // صورة رمزية مؤقتة
            photoURL: "https://ui-avatars.com/api/?name=Mustafa&background=020617&color=fff&bold=true",
            uid: "demo_id"
        };

        // تفعيل الواجهة مباشرة عند فتح الصفحة
        window.onload = () => {
            // إخفاء صفحة الدخول فوراً
            document.getElementById('login-page').style.display = 'none';
            // إظهار المحتوى الرئيسي
            document.getElementById('app-content').style.display = 'block';
            setupDemoProfile(demoUser);
        };

        async function setupDemoProfile(user) {
            // هنا وضعنا كل المميزات والبيانات التي طلبتها لترى النتيجة النهائية
            const fakeData = {
                wallet: 1515.00, // الرصيد الذي كنا نعمل عليه
                likes: 35,      // سيظهر لك نجوم تلقائياً
                hearts: 22,
                bio: "مستثمر طموح في بورصة سكيلبت | قيد التطوير النهائي",
                // صورة غلاف احترافية
                cover: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000&auto=format&fit=crop",
                // تاريخ الأرباح للرسم البياني
                history: [1100, 1050, 1400, 1380, 1515]
            };
            
            window.userData = fakeData;
            renderProfileUI(fakeData, user);
            initChart(fakeData.history);
        }

        function renderProfileUI(data, user) {
            document.getElementById('user-img').src = user.photoURL;
            document.getElementById('cover-img').style.backgroundImage = `url(${data.cover})`;
            document.getElementById('profile-name').innerText = user.displayName;
            document.getElementById('profile-bio').innerText = data.bio;
            
            // نظام النجوم التلقائي (10 لايك/5 قلوب = نجمة)
            const starsFromLikes = Math.floor(data.likes / 10);
            const starsFromHearts = Math.floor(data.hearts / 5);
            const totalStars = starsFromLikes + starsFromHearts;
            
            // إظهار النجوم ⭐
            document.getElementById('star-count').innerText = "⭐".repeat(totalStars) || "مبتدئ 🐣";
            // إظهار التفاعلات 👍❤️
            document.getElementById('stats-display').innerText = `👍 ${data.likes} | ❤️ ${data.hearts}`;
            // إظهار الرصيد
            document.getElementById('balance-profile').innerText = `$${data.wallet.toLocaleString()}`;
        }

        let myChart;
        function initChart(historyData) {
            const ctx = document.getElementById('investmentChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'اليوم'],
                    datasets: [{
                        label: 'أداء المحفظة',
                        data: historyData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.35
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { display: false }, 
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#64748b', font: { size: 9 } } 
                        } 
                    }
                }
            });
        }
    </script>

    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 120px; }
        /* تصميم الزجاج الشفاف */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-bottom: 3px solid #3b82f6; color: white; }
    </style>
</head>
<body>

    <div id="login-page" style="display:none;" class="fixed inset-0 z-[5000] bg-[#020617] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black italic mb-4 text-blue-500">SKILLBIT</h1>
    </div>

    <div id="app-content" style="display:none" class="pb-32">
        <div id="profile-section" class="max-w-xl mx-auto">
            <div id="cover-img" class="h-48 bg-cover bg-center relative rounded-b-[40px] shadow-2xl transition-all duration-700">
                <div class="absolute -bottom-12 right-8">
                    <img id="user-img" src="" class="w-24 h-24 rounded-3xl border-4 border-[#020617] shadow-xl">
                </div>
            </div>

            <div class="mt-14 px-8">
                <h2 id="profile-name" class="text-2xl font-black text-white">تحميل..</h2>
                <div id="star-count" class="text-yellow-400 text-sm mt-1"></div>
                <p id="profile-bio" class="text-slate-400 text-sm mt-2 leading-relaxed italic"></p>
                
                <div class="flex gap-4 mt-5">
                    <div class="glass flex-1 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Available Balance</p>
                        <p id="balance-profile" class="text-2xl font-black text-whiteTracking-tight">$0</p>
                    </div>
                    <div class="glass flex-1 p-3 rounded-2xl text-center">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">التفاعل 👍❤️</p>
                        <p id="stats-display" class="text-sm font-bold mt-1">0 | 0</p>
                    </div>
                </div>

                <div class="glass mt-8 p-6 rounded-[30px] border border-blue-500/10">
                    <h3 class="text-xs font-bold text-blue-400 mb-6 uppercase tracking-widest text-center">أداء استثماراتك في الأشهر السابقة</h3>
                    <canvas id="investmentChart"></canvas>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around items-center rounded-t-[35px] z-50 border-t border-white/5 shadow-2xl">
            <button class="flex flex-col items-center gap-1">
                <span class="text-xl">📊</span>
                <span class="text-[10px] font-bold">السوق</span>
            </button>
            <button class="flex flex-col items-center gap-1 opacity-100">
                <span class="text-xl text-blue-500">👤</span>
                <span class="text-[10px] font-bold text-blue-500">حسابي</span>
            </button>
            <button onclick="document.getElementById('add-modal').style.display='flex'" class="bg-blue-600 w-12 h-12 rounded-full flex items-center justify-center shadow-lg -mt-10 border-4 border-[#020617] scale-105 active:scale-95 transition-all">
                <span class="text-2xl font-black">+</span>
            </button>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/95 z-[6000] hidden items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-8 rounded-[40px] w-full max-w-md border border-blue-500/10 text-right">
            <h2 class="text-2xl font-black mb-6 text-center text-blue-400">تعديل الغلاف والسيرة</h2>
            <div class="space-y-4">
                <input type="text" placeholder="اسمك التجاري الجديد" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-white/5">
                <textarea placeholder="نبذة صغيرة تظهر للمستثمرين" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-white/5 h-24"></textarea>
                <button onclick="document.getElementById('add-modal').style.display='none'" class="w-full bg-blue-600 p-4 rounded-2xl font-black shadow-xl">موافق، تم التعديل</button>
                <button type="button" onclick="document.getElementById('add-modal').style.display='none'" class="w-full text-slate-500 text-sm">إلغاء</button>
            </div>
        </div>
    </div>

</body>
</html>
