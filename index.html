<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBit Pro | بورصة المهارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // كود الربط الخاص بمصطفى
        const firebaseConfig = {
            apiKey: "AIzaSyBnmfqxq_kWTYnxw2JPFRhfdfjhOjnQ3c0",
            authDomain: "skillbit-pro.firebaseapp.com",
            projectId: "skillbit-pro",
            storageBucket: "skillbit-pro.firebasestorage.app",
            messagingSenderId: "67822035704",
            appId: "1:67822035704:web:62dbf17cc9a5b5aeccd10d",
            measurementId: "G-LYGG6H3JNW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // جعل القاعدة متاحة لبقية الكود
    </script>

    <style>
        body { background: #050810; color: white; font-family: 'Inter', sans-serif; padding-bottom: 160px; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: 0.3s; }
        .btn-sell { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .btn-sell:hover { background: #ef4444; color: white; }
        .wallet-bar { background: rgba(10, 15, 30, 0.9); border-top: 1px solid #1e293b; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-10 max-w-xl mx-auto">
        <div>
            <h1 class="text-2xl font-black text-blue-500 italic">SKILLBIT PRO</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] text-slate-400 uppercase tracking-tighter">Live Market Data</span>
            </div>
        </div>
        <button onclick="document.getElementById('add-modal').style.display='flex'" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-900/20">ADD SKILL</button>
    </header>

    <div id="market-list" class="grid gap-6 max-w-xl mx-auto">
        </div>

    <div id="portfolio-modal" class="fixed inset-0 bg-black/90 z-[2000] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-[32px] p-8 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">استثماراتي 💼</h2>
                <button onclick="closePortfolio()" class="text-slate-500 text-2xl">✕</button>
            </div>
            <div id="my-assets" class="space-y-4"></div>
        </div>
    </div>

    <div class="wallet-bar p-6 shadow-2xl" onclick="openPortfolio()">
        <div class="max-w-xl mx-auto flex justify-between items-center cursor-pointer">
            <div>
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1 italic">Total Balance</p>
                <p id="balance-display" class="text-4xl font-black text-white tracking-tighter">$1,000.00</p>
            </div>
            <div class="text-right">
                <p id="asset-count" class="text-blue-500 font-black text-2xl tracking-tighter">0</p>
                <p class="text-slate-500 text-[10px] uppercase font-bold">Assets</p>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10B2UEleMirTtUhhZlSrtHW_dn9LiXtTu050gSxmJhI8/export?format=csv';
        let wallet = parseFloat(localStorage.getItem('sb_wallet')) || 1000.00;
        let assets = JSON.parse(localStorage.getItem('sb_assets')) || [];
        let marketData = {};

        function openPortfolio() { document.getElementById('portfolio-modal').style.display = 'flex'; renderAssets(); }
        function closePortfolio() { document.getElementById('portfolio-modal').style.display = 'none'; }

        function renderAssets() {
            const container = document.getElementById('my-assets');
            container.innerHTML = assets.length === 0 ? '<p class="text-slate-600 text-center">لا توجد أسهم حالياً</p>' : '';
            assets.forEach((item, index) => {
                const currentPrice = marketData[item.name] || item.buyPrice;
                const profit = (currentPrice - item.buyPrice).toFixed(2);
                const profitClass = profit >= 0 ? 'text-emerald-400' : 'text-red-400';

                container.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center border-l-4 border-blue-500">
                        <div>
                            <p class="font-bold text-lg">${item.name}</p>
                            <p class="text-xs ${profitClass}">الربح: $${profit}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <p class="font-black text-white">$${currentPrice}</p>
                            <button onclick="sellAsset(${index}, ${currentPrice})" class="btn-sell px-4 py-1 rounded-lg text-[10px] font-bold uppercase">Sell</button>
                        </div>
                    </div>
                `;
            });
        }

        function invest(name, price) {
            if (wallet >= price) {
                wallet -= price;
                assets.push({ name, buyPrice: price, date: new Date().toLocaleTimeString() });
                saveData();
                alert(`🚀 تم شراء سهم ${name}`);
            } else { alert("❌ رصيدك لا يكفي"); }
        }

        function sellAsset(index, currentPrice) {
            wallet += currentPrice;
            assets.splice(index, 1);
            saveData();
            renderAssets();
            alert("💰 تم بيع السهم وإضافة المبلغ لرصيدك");
        }

        function saveData() {
            localStorage.setItem('sb_wallet', wallet);
            localStorage.setItem('sb_assets', JSON.stringify(assets));
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = `$${wallet.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('asset-count').innerText = assets.length;
        }

        function fetchMarket() {
            Papa.parse(SHEET_URL, {
                download: true, header: true,
                complete: function(results) {
                    const market = document.getElementById('market-list');
                    market.innerHTML = '';
                    results.data.forEach(row => {
                        if(row.Name) {
                            const name = row.Name;
                            const price = parseFloat(row.Price);
                            marketData[name] = price;

                            market.innerHTML += `
                                <div class="glass-card p-6 shadow-2xl">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 class="font-black text-xl tracking-tight">${name}</h3>
                                            <p class="text-blue-500 text-[10px] font-bold uppercase tracking-widest">${row.Skill}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-2xl font-black text-white">$${price}</p>
                                            <p class="text-[9px] text-slate-500 font-bold uppercase">Market Price</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-3 mt-6">
                                        <button onclick="invest('${name}', ${price})" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-2xl font-black text-xs transition-all">INVEST NOW</button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                    updateUI();
                }
            });
        }

        fetchMarket(); setInterval(fetchMarket, 10000); updateUI();
    </script>
</body>
</html>
